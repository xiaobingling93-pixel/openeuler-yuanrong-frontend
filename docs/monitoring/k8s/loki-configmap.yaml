apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
  labels:
    app: loki
data:
  local-config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
      retention_period: 168h

      # 将常用的 OTel resource attributes 升为 Loki stream label（可用于 stream selector 高效过滤）
      # node.name      → node_name      按节点名检索日志
      # component.name → component_name 按 C++ 组件检索（function_master / function_agent 等）
      # process.name   → process_name   按 Go 进程角色检索（frontend-process / scheduler-process 等）
      otlp_config:
        resource_attributes:
          attributes_config:
            - action: index_label
              attributes:
                - node.name
                - component.name
                - process.name

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      filesystem:
        directory: /loki/storage

    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      delete_request_store: filesystem
