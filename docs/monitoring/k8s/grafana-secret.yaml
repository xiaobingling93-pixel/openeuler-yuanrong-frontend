apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: monitoring
  labels:
    app: grafana
type: Opaque
stringData:
  admin-password: admin  # 生产环境请使用强密码，建议使用 kubectl create secret

---
# 使用以下命令创建 Secret（推荐）:
# kubectl create secret generic grafana-secret \
#   --from-literal=admin-password='your-strong-password' \
#   -n monitoring
