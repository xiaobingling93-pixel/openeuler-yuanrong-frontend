apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'yuanrong-frontend'
        environment: 'kubernetes'

    scrape_configs:
      # Prometheus 自身指标
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
            labels:
              instance: 'prometheus'

      # Frontend 服务指标
      # 使用 Service 名称和端口
      - job_name: 'yuanrong-frontend'
        scrape_interval: 10s
        metrics_path: '/metrics'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - default  # 根据实际 namespace 修改
        relabel_configs:
          # 只抓取有 metrics 端点的服务
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: metrics
            action: keep
          # 或者使用注解方式
          # - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
          #   regex: 'true'
          #   action: keep
          - source_labels: [__meta_kubernetes_service_name]
            target_label: service
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      # 如果使用静态配置，取消下面的注释
      # - job_name: 'yuanrong-frontend-static'
      #   scrape_interval: 10s
      #   metrics_path: '/metrics'
      #   static_configs:
      #     - targets: ['yuanrong-frontend-service:8888']  # Service名称:端口
      #       labels:
      #         service: 'yuanrong-frontend'
      #         instance: 'frontend-1'

      # 抓取 OTel Collector 自身指标
      - job_name: 'otel-collector'
        scrape_interval: 15s
        metrics_path: '/metrics'
        static_configs:
          - targets: ['otel-collector:8889']
            labels:
              service: 'otel-collector'
              instance: 'otel-collector-k8s'
