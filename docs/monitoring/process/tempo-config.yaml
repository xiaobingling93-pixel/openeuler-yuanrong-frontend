# Grafana Tempo 配置（裸进程部署）
# 启动命令示例:
#   tempo -config.file=tempo-config.yaml
# 需要预先 export MONITORING_DIR=/path/to/process 目录
# Tempo 支持通过环境变量展开配置中的 ${VAR}

stream_over_http_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          # 注意: 裸进程模式下 OTel Collector 也在本机
          # OTel Collector 使用 4317，Tempo 使用 4320 避免冲突
          endpoint: 0.0.0.0:4320
        http:
          endpoint: 0.0.0.0:4321

storage:
  trace:
    backend: local
    local:
      path: ${MONITORING_DIR}/tempo/data/traces
    wal:
      path: ${MONITORING_DIR}/tempo/data/wal

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: ${MONITORING_DIR}/tempo/data/generator/wal
    remote_write:
      # 将 trace 派生的 RED metrics 写入本地 Prometheus
      - url: http://localhost:9090/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
