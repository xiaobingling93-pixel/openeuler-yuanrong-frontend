# Prometheus configuration file
global:
  scrape_interval: 15s      # 每15秒拉取一次指标
  evaluation_interval: 15s  # 每15秒评估一次规则
  external_labels:
    cluster: 'yuanrong-frontend'
    environment: 'development'

# Alertmanager configuration (可选)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# 规则文件路径 (可选)
# rule_files:
#   - "alert_rules.yml"

# 抓取配置
scrape_configs:
  # 抓取 Prometheus 自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # 抓取 OTel Collector 自身监控指标（collector 内部遥测）
  - job_name: 'otel-collector'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8888']
        labels:
          service: 'otel-collector'
          instance: 'otelcol-1'

  # 注：OTLP 业务指标（yr_* / function_* 等）由 OTel Collector 通过
  # prometheusremotewrite 直接 push 到 Prometheus，无需额外 scrape 配置
