syntax = "proto3";

package function_service;

import "common_args.proto";

option go_package = "frontend/pkg/common/faas_common/grpc/pb/function;function";

// Core service provides APIs to runtime,
service CoreService {
  // Create an instance for specify function
  rpc Create (CreateRequest) returns (CreateResponse) {}
  // invoke the created instance
  rpc Invoke (InvokeRequest) returns (InvokeResponse) {}
  // terminate the created instance
  rpc Terminate (TerminateRequest) returns (TerminateResponse) {}
  // exit the created instance
  rpc Exit (ExitRequest) returns (ExitResponse) {}
  // save state of the created instance
  rpc SaveState (StateSaveRequest) returns (StateSaveResponse) {}
  // load state of the created instance
  rpc LoadState (StateLoadRequest) returns (StateLoadResponse) {}
  // Kill the signal to instance
  rpc Kill (KillRequest) returns (KillResponse) {}
}

enum AffinityType {
  PreferredAffinity     = 0;
  PreferredAntiAffinity = 1;
  RequiredAffinity      = 2;
  RequiredAntiAffinity  = 3;
}

message SchedulingOptions {
  int32               priority        = 1;
  map<string, double> resources       = 2;
  map<string, string> extension       = 3;
  // will deprecate in future
  map<string, AffinityType> affinity      = 4;
  commonargs.Affinity scheduleAffinity    = 5;
}

message CreateRequest {
  string                  function      = 1;
  repeated commonargs.Arg args          = 2;
  SchedulingOptions       schedulingOps = 3;
  string                  requestID     = 4;
  string                  traceID       = 5;
  repeated string         labels        = 6;  // "key:value" or "key2"
  // optional. if designated instanceID is not empty, the created instance id will be assigned designatedInstanceID
  string			     designatedInstanceID = 7;
  map<string, string>     createOptions = 8;
}

message CreateResponse {
  commonargs.ErrorCode code       = 1;
  string               message    = 2;
  string               instanceID = 3;
}

// gang scheduling
message CreateRequests {
  repeated CreateRequest      requests = 1;
}

// gang scheduling
message CreateResponses {
  commonargs.ErrorCode code        = 1;
  string               message     = 2;
  repeated string      instanceIDs = 3;
}

message InvokeRequest {
  string                  function         = 1;
  repeated commonargs.Arg args             = 2;
  string                  instanceID       = 3;
  string                  requestID        = 4;
  string                  traceID          = 5;
  repeated string         returnObjectIDs  = 6;
  string                  spanID           = 7;
}

message InvokeResponse {
  commonargs.ErrorCode code           = 1;
  string               message        = 2;
  string               returnObjectID = 3;
}

message NotifyRequest {
  string                          requestID    = 1;
  commonargs.ErrorCode            code         = 2;
  string                          message      = 3;
  repeated commonargs.SmallObject smallObjects = 4;
}

message CallResult {
  commonargs.ErrorCode            code         = 1;
  string                          message      = 2;
  string                          instanceID   = 3;
  string                          requestID    = 4;
  repeated commonargs.SmallObject smallObjects = 5;
}

message CallResultAck {
  commonargs.ErrorCode  code           = 1;
  string                message        = 2;
}

message TerminateRequest {
  string instanceID = 1;
}

message TerminateResponse {
  commonargs.ErrorCode code    = 1;
  string               message = 2;
}

message ExitRequest {
  commonargs.ErrorCode code    = 1;
  string               message = 2;
}

message ExitResponse {
  commonargs.ErrorCode code    = 1;
  string               message = 2;
}

message StateSaveRequest {
  bytes state = 1;
}

message StateSaveResponse {
  commonargs.ErrorCode  code         = 1;
  string                message      = 2;
  string                checkpointID = 3;
}

message StateLoadRequest {
  string checkpointID = 1;
}

message StateLoadResponse {
  commonargs.ErrorCode  code    = 1;
  string                message = 2;
  bytes                 state   = 3;
}

message KillRequest {
  string instanceID = 1;
  int32  signal     = 2;
  bytes  payload    = 3;
}

message KillResponse {
  commonargs.ErrorCode  code    = 1;
  string                message = 2;
}

